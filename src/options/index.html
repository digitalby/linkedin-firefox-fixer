<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LinkedIn Firefox Fixer</title>
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        padding: 1rem;
        max-width: 32rem;
      }
      h1 {
        font-size: 1.1rem;
        margin: 0 0 0.75rem;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      li {
        border-top: 1px solid #e5e5e5;
        padding: 0.75rem 0;
      }
      li:last-child {
        border-bottom: 1px solid #e5e5e5;
      }
      .title {
        font-weight: 600;
      }
      .desc {
        font-size: 0.85rem;
        color: #555;
        margin-top: 0.2rem;
      }
      label {
        display: flex;
        gap: 0.6rem;
        align-items: flex-start;
      }
    </style>
  </head>
  <body>
    <h1>LinkedIn Firefox Fixer</h1>
    <ul id="modules"></ul>
    <script src="index.js"></script>
  </body>
</html>
