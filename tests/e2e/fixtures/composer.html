<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LinkedIn DM composer fixture</title>
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        margin: 2rem;
        background: #f4f2ee;
      }
      .msg-form__container {
        background: white;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 1rem;
        max-width: 40rem;
      }
      .msg-form__contenteditable {
        min-height: 4rem;
        padding: 0.5rem;
        outline: 1px solid #d0d0d0;
        white-space: pre-wrap;
        cursor: text;
      }
      .msg-form__contenteditable:focus {
        outline: 2px solid #0a66c2;
      }
    </style>
  </head>
  <body>
    <h1>DM composer</h1>
    <div class="msg-form__container">
      <div
        class="msg-form__contenteditable ql-editor"
        role="textbox"
        contenteditable="true"
        aria-label="Write a message"
      ></div>
    </div>

    <script>
      // Minimal facsimile of how LinkedIn/Quill wires Enter in the DM composer:
      // bare Enter triggers "send", Shift+Enter inserts a native line break
      // which the broken Firefox path corrupts. This handler is intentionally
      // naive so the regression canary can observe native contenteditable
      // behavior without the extension.
      (function () {
        const editor = document.querySelector('.msg-form__contenteditable');
        editor.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            window.__fixtureSubmitted = editor.innerText;
          }
        });
      })();
    </script>
  </body>
</html>
